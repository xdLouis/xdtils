# ── Economy ─────────────────────────────────────────────────
economy:
  enabled: true
  vault-hook: true
  pay-enabled: true
  admin-enabled: true
  start-balance: 0.0

# ── Permission-System ───────────────────────────────────────
permissions-system:
  enabled: true
  gui-enabled: true
  default-group: default

# ── Glow ────────────────────────────────────────────────────
glow:
  enabled: true
  colors-enabled: true
  default-color: white
  players: {}

# ── Trails ──────────────────────────────────────────────────
trail:
  enabled: true
  update-interval-ticks: 3

# ── Freeze ──────────────────────────────────────────────────
freeze:
  block-movement: true
  block-damage: true
  block-chat: false
  block-commands: false

# ── Maintenance ─────────────────────────────────────────────
maintenance:
  enabled: false
  kick-message: "<red>Der Server befindet sich aktuell im Wartungsmodus.</red>"
  allow-ops: true
  allow-permission: "xdtils.maintenance.bypass"

# ── Mute ────────────────────────────────────────────────────
mute:
  block-chat: true
  blocked-message: "<red>Du bist gemutet und kannst nicht schreiben.</red>"

# ── Messages / Formatting (optional für spätere Nutzung) ───
messages:
  prefix-enabled: true

# ── Features / future-proof ─────────────────────────────────
features:
  save-on-disable: true
  refresh-permissions-on-join: true
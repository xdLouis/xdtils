name: xdtils
version: '${version}'

main: de.louis.xdtils.main.Main
api-version: '1.21'
load: POSTWORLD

commands:
  gamemode:
    description: Ändert den Spielmodus
    usage: /gamemode <mode> [spieler|@a]
    aliases: [gm]
    permission: xdtils.gamemode

  speed:
    description: Setzt Walk- oder Flyspeed automatisch
    usage: /speed <0-10> [spieler]
    permission: xdtils.speed

  walkspeed:
    description: Setzt den Walkspeed
    usage: /walkspeed <0-10> [spieler]
    permission: xdtils.walkspeed

  flyspeed:
    description: Setzt den Flyspeed
    usage: /flyspeed <0-10> [spieler]
    permission: xdtils.flyspeed

  workbench:
    description: Öffnet eine Werkbank
    usage: /workbench
    permission: xdtils.workbench
  anvil:
    description: Öffnet einen Amboss
    usage: /anvil
    permission: xdtils.anvil
  grindstone:
    description: Öffnet einen Schleifstein
    usage: /grindstone
    permission: xdtils.grindstone
  cartography:
    description: Öffnet einen Kartografietisch
    usage: /cartography
    permission: xdtils.cartography
  loom:
    description: Öffnet einen Webstuhl
    usage: /loom
    permission: xdtils.loom
  stonecutter:
    description: Öffnet einen Steinschneider
    usage: /stonecutter
    permission: xdtils.stonecutter
  smithing:
    description: Öffnet einen Schmiedetisch
    usage: /smithing
    permission: xdtils.smithing
  enchanting:
    description: Öffnet einen Zaubertisch
    usage: /enchanting
    permission: xdtils.enchanting

permissions:
  xdtils.gamemode:
    default: op
  xdtils.speed:
    default: op
  xdtils.walkspeed:
    default: op
  xdtils.flyspeed:
    default: op
  xdtils.workbench:
    default: true
  xdtils.anvil:
    default: true
  xdtils.grindstone:
    default: true
  xdtils.cartography:
    default: true
  xdtils.loom:
    default: true
  xdtils.stonecutter:
    default: true
  xdtils.smithing:
    default: true
  xdtils.enchanting:
    default: true
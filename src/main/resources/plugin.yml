name: xdtils
version: '${version}'
main: de.louis.xdtils.main.Main
api-version: '1.21'
load: POSTWORLD

commands:
  gamemode:
    description: Ändert den Spielmodus
    usage: /gamemode <mode> [spieler|@a]
    aliases: [gm]
    permission: xdtils.gamemode
  speed:
    description: Setzt Walk- oder Flyspeed automatisch
    usage: /speed <0-10> [spieler]
    permission: xdtils.speed
  walkspeed:
    description: Setzt den Walkspeed
    usage: /walkspeed <0-10> [spieler]
    permission: xdtils.walkspeed
  flyspeed:
    description: Setzt den Flyspeed
    usage: /flyspeed <0-10> [spieler]
    permission: xdtils.flyspeed
  enchant:
    description: Verzaubert das Item in der Hand
    usage: /enchant <verzauberung> <level>
    permission: xdtils.enchant
  hat:
    description: Setzt das Item in der Hand auf den Kopf
    usage: /hat
    permission: xdtils.hat
  invsee:
    description: Öffnet das Inventar eines Spielers
    usage: /invsee <spieler>
    permission: xdtils.invsee
  back:
    description: Teleportiert zur letzten Position
    usage: /back
    permission: xdtils.back
  tp:
    description: Teleportiert Spieler
    usage: /tp <spieler> | @a <ziel> | <x> <y> <z>
    permission: xdtils.tp
  clear:
    description: Leert das Inventar
    usage: /clear [spieler|@a]
    permission: xdtils.clear
  trash:
    description: Öffnet den Mülleimer
    usage: /trash
    permission: xdtils.trash
  i:
    description: Gibt dir ein Item
    usage: /i <item> [menge]
    permission: xdtils.item
  give:
    description: Gibt einem Spieler ein Item
    usage: /give <spieler|@a> <item> [menge]
    permission: xdtils.give
  kick:
    description: Kickt einen Spieler
    usage: /kick <spieler> [grund]
    permission: xdtils.kick
  ban:
    description: Bannt einen Spieler
    usage: /ban <spieler> [grund]
    permission: xdtils.ban
  ban-ip:
    description: Bannt eine IP
    usage: /ban-ip <ip> [grund]
    permission: xdtils.ban.ip
  pardon:
    description: Entbannt einen Spieler
    usage: /pardon <spieler>
    permission: xdtils.pardon
  pardon-ip:
    description: Entbannt eine IP
    usage: /pardon-ip <ip>
    permission: xdtils.pardon.ip
  op:
    description: Gibt einem Spieler OP
    usage: /op <spieler>
    permission: xdtils.op
  deop:
    description: Entzieht einem Spieler OP
    usage: /deop <spieler>
    permission: xdtils.deop
  kill:
    description: Tötet einen Spieler
    usage: /kill [spieler|@a]
    permission: xdtils.kill
  time:
    description: Ändert die Weltzeit
    usage: /time <set|add|query> [wert]
    permission: xdtils.time
  weather:
    description: Ändert das Wetter
    usage: /weather <clear|rain|thunder>
    permission: xdtils.weather
  difficulty:
    description: Ändert die Schwierigkeit
    usage: /difficulty <peaceful|easy|normal|hard>
    permission: xdtils.difficulty
  whitelist:
    description: Verwaltet die Whitelist
    usage: /whitelist <on|off|add|remove|list|reload>
    permission: xdtils.whitelist
  heal:
    description: Heilt einen Spieler
    usage: /heal [spieler|@a]
    permission: xdtils.heal
  feed:
    description: Sättigt einen Spieler
    usage: /feed [spieler|@a]
    permission: xdtils.feed
  fly:
    description: Schaltet den Flugmodus um
    usage: /fly [spieler] [on|off]
    permission: xdtils.fly
  workbench:
    description: Öffnet eine Werkbank
    usage: /workbench
    permission: xdtils.workbench
  anvil:
    description: Öffnet einen Amboss
    usage: /anvil
    permission: xdtils.anvil
  grindstone:
    description: Öffnet einen Schleifstein
    usage: /grindstone
    permission: xdtils.grindstone
  cartography:
    description: Öffnet einen Kartografietisch
    usage: /cartography
    permission: xdtils.cartography
  loom:
    description: Öffnet einen Webstuhl
    usage: /loom
    permission: xdtils.loom
  stonecutter:
    description: Öffnet einen Steinschneider
    usage: /stonecutter
    permission: xdtils.stonecutter
  smithing:
    description: Öffnet einen Schmiedetisch
    usage: /smithing
    permission: xdtils.smithing
  enchanting:
    description: Öffnet einen Zaubertisch
    usage: /enchanting
    permission: xdtils.enchanting

permissions:
  xdtils.gamemode:
    default: op
  xdtils.speed:
    default: op
  xdtils.walkspeed:
    default: op
  xdtils.flyspeed:
    default: op
  xdtils.enchant:
    default: op
  xdtils.hat:
    default: op
  xdtils.invsee:
    default: op
  xdtils.back:
    default: true
  xdtils.tp:
    default: op
  xdtils.clear:
    default: op
  xdtils.trash:
    default: true
  xdtils.item:
    default: op
  xdtils.give:
    default: op
  xdtils.kick:
    default: op
  xdtils.ban:
    default: op
  xdtils.ban.ip:
    default: op
  xdtils.pardon:
    default: op
  xdtils.pardon.ip:
    default: op
  xdtils.op:
    default: op
  xdtils.deop:
    default: op
  xdtils.kill:
    default: op
  xdtils.time:
    default: op
  xdtils.weather:
    default: op
  xdtils.difficulty:
    default: op
  xdtils.whitelist:
    default: op
  xdtils.heal:
    default: op
  xdtils.feed:
    default: op
  xdtils.fly:
    default: op
  xdtils.workbench:
    default: true
  xdtils.anvil:
    default: true
  xdtils.grindstone:
    default: true
  xdtils.cartography:
    default: true
  xdtils.loom:
    default: true
  xdtils.stonecutter:
    default: true
  xdtils.smithing:
    default: true
  xdtils.enchanting:
    default: true
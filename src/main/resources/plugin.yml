  xdtils.item:
    default: op
  xdtils.give:
    default: op
  xdtils.kick:
    default: op
  xdtils.ban:
    default: op
  xdtils.ban.ip:
    default: op
  xdtils.pardon:
    default: op
  xdtils.pardon.ip:
    default: op
  xdtils.op:
    default: op
  xdtils.deop:
    default: op
  xdtils.kill:
